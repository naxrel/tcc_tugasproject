<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Cukur Rusdi</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:#0d0d0d;color:#f0f0f0;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;
  background:radial-gradient(ellipse at 50% 0%,rgba(245,166,35,0.12) 0%,transparent 60%)}
.logo{font-size:3.5rem;margin-bottom:12px;text-align:center}
h1{font-size:2rem;font-weight:800;text-align:center;margin-bottom:8px}
h1 span{color:#f5a623}
p{color:#666;text-align:center;font-size:0.9rem;margin-bottom:48px;max-width:360px;line-height:1.6}
.cards{display:grid;grid-template-columns:1fr 1fr;gap:16px;max-width:480px;width:100%}
.card{border-radius:16px;padding:28px;text-decoration:none;transition:transform 0.2s,box-shadow 0.2s;border:1px solid #252525}
.card:hover{transform:translateY(-4px)}
.card-icon{font-size:2.5rem;margin-bottom:12px}
.card h2{font-size:1.05rem;font-weight:700;margin-bottom:6px}
.card p{font-size:0.78rem;color:#888;margin-bottom:0}
.card.pelanggan{background:#161616}
.card.kasir{background:linear-gradient(135deg,rgba(245,166,35,0.15),rgba(224,123,0,0.08));border-color:rgba(245,166,35,0.3)}
.card.kasir h2{color:#f5a623}
.tag{font-size:0.65rem;font-weight:700;padding:2px 8px;border-radius:20px;background:rgba(245,166,35,0.15);color:#f5a623;display:inline-block;margin-bottom:8px}
</style>
</head>
<body>
<div class="logo">✂️</div>
<h1>Barber<span>Q</span></h1>
<p>Sistem manajemen antrean pangkas rambut digital. Pilih portal sesuai peranmu.</p>
<div class="cards">
  <a href="pelanggan.html" class="card pelanggan">
    <div class="card-icon">📱</div>
    <div class="tag">MOBILE</div>
    <h2>Portal Pelanggan</h2>
    <p>Booking, cek antrean & notifikasi giliran</p>
  </a>
  <a href="kasir.html" class="card kasir">
    <div class="card-icon">🖥️</div>
    <div class="tag">WEB</div>
    <h2>Panel Kasir</h2>
    <p>Monitor kursi, kelola booking & antrean</p>
  </a>
</div>
</body>
</html>
